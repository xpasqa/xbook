<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Buku | Publion Books</title>
    <meta name="description" content="Dashboard untuk menambahkan buku ke katalog Publion Books." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              onest: ['"Onest"', "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="font-onest bg-slate-50 text-slate-950 antialiased">
    <div id="site-header"></div>

    <main class="mx-auto max-w-screen-xl px-4 py-8 sm:px-6 lg:px-8">
      <div class="mb-8 flex flex-col gap-3 lg:flex-row lg:items-end lg:justify-between">
        <div>
          <h1 class="text-3xl font-bold tracking-tight text-slate-950">Dashboard Buku</h1>
        </div>
        <div class="flex gap-3">
          <a
            href="/"
            class="inline-flex w-fit rounded-md border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-900 transition hover:bg-slate-100"
          >
            Lihat Katalog
          </a>
          <a
            href="/tambah-buku.html"
            class="inline-flex w-fit rounded-md bg-slate-950 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-teal-600"
          >
            Tambah Buku
          </a>
        </div>
      </div>

      <div id="dashboard-alert" class="mb-6 hidden rounded-md border px-4 py-3 text-sm"></div>

      <section class="rounded-md bg-white shadow-sm ring-1 ring-slate-200">
        <div class="flex items-center justify-between gap-3 border-b border-slate-200 px-5 py-4">
          <h2 class="text-lg font-bold text-slate-950">List Buku</h2>
          <span id="admin-count" class="text-xs font-semibold text-slate-500"></span>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-slate-200 text-left text-sm">
            <thead class="bg-slate-50 text-xs font-bold uppercase tracking-wide text-slate-500">
              <tr>
                <th class="px-5 py-3">Judul</th>
                <th class="px-5 py-3">Author</th>
                <th class="px-5 py-3">Category</th>
                <th class="px-5 py-3">Status</th>
                <th class="px-5 py-3 text-right">View</th>
                <th class="px-5 py-3 text-right">Edit</th>
              </tr>
            </thead>
            <tbody id="admin-books" class="divide-y divide-slate-100 bg-white text-slate-700">
              <tr>
                <td class="px-5 py-4" colspan="6">Memuat data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section id="editor-panel" class="mt-8 hidden rounded-md bg-white p-5 shadow-sm ring-1 ring-slate-200">
          <div class="flex flex-col gap-2 border-b border-slate-200 pb-4 sm:flex-row sm:items-start sm:justify-between">
            <div>
              <h2 id="editor-title" class="text-lg font-bold text-slate-950">Tambah Buku</h2>
            </div>
            <button
              id="cancel-edit-button"
              type="button"
              class="inline-flex w-fit rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-900 transition hover:bg-slate-100"
            >
              Tutup Editor
            </button>
          </div>
          <form id="book-form" class="mt-5 grid grid-cols-1 gap-4 md:grid-cols-2">
            <label class="block md:col-span-2">
              <span class="text-sm font-semibold text-slate-700">Judul</span>
              <input id="title" name="title" required class="form-input" placeholder="Judul buku" />
            </label>

            <label class="block">
              <span class="text-sm font-semibold text-slate-700">Penulis</span>
              <input id="author" name="author" required class="form-input" placeholder="Nama penulis" />
            </label>

            <label class="block">
              <span class="text-sm font-semibold text-slate-700">Kategori</span>
              <input id="category" name="category" required class="form-input" placeholder="Kebijakan Publik" />
            </label>

            <label class="block">
              <span class="text-sm font-semibold text-slate-700">Harga</span>
              <input id="price" name="price" type="number" min="0" step="1000" required class="form-input" placeholder="150000" />
            </label>

            <label class="block">
              <span class="text-sm font-semibold text-slate-700">ISBN</span>
              <input id="isbn" name="isbn" class="form-input" placeholder="Dalam Proses Pengajuan" />
            </label>

            <label class="block md:col-span-2">
              <span class="text-sm font-semibold text-slate-700">Deskripsi singkat untuk kartu katalog</span>
              <input id="short_description" name="short_description" required class="form-input" placeholder="Ringkasan satu kalimat" />
            </label>

            <label class="block md:col-span-2">
              <span class="text-sm font-semibold text-slate-700">Sinopsis</span>
              <textarea id="synopsis" name="synopsis" required rows="7" class="form-textarea" placeholder="Sinopsis buku"></textarea>
            </label>

            <label class="block md:col-span-2">
              <span class="text-sm font-semibold text-slate-700">Kata kunci</span>
              <input id="keywords" name="keywords" class="form-input" placeholder="kebijakan publik, dampak sosial, evaluasi" />
            </label>

            <label class="block">
              <span class="text-sm font-semibold text-slate-700">Upload cover depan</span>
              <input id="front_cover_file" name="front_cover_file" type="file" accept="image/*" class="mt-1 block w-full text-sm text-slate-600 file:mr-3 file:rounded-md file:border-0 file:bg-slate-950 file:px-3 file:py-2 file:text-sm file:font-semibold file:text-white hover:file:bg-teal-600" />
            </label>

            <label class="block">
              <span class="text-sm font-semibold text-slate-700">Upload cover belakang</span>
              <input id="back_cover_file" name="back_cover_file" type="file" accept="image/*" class="mt-1 block w-full text-sm text-slate-600 file:mr-3 file:rounded-md file:border-0 file:bg-slate-950 file:px-3 file:py-2 file:text-sm file:font-semibold file:text-white hover:file:bg-teal-600" />
            </label>

            <label class="block md:col-span-2">
              <span class="text-sm font-semibold text-slate-700">Link beli</span>
              <input id="buy_url" name="buy_url" class="form-input" placeholder="https://..." />
            </label>

            <label class="block md:col-span-2">
              <span class="text-sm font-semibold text-slate-700">Link Google Books</span>
              <input id="google_books_url" name="google_books_url" class="form-input" placeholder="https://books.google.com/..." />
            </label>

            <label class="flex items-center gap-3 md:col-span-2">
              <input id="published" name="published" type="checkbox" checked class="h-4 w-4 rounded border-slate-300 text-slate-950 focus:ring-slate-950" />
              <span class="text-sm font-semibold text-slate-700">Publikasikan langsung di katalog</span>
            </label>

            <div class="md:col-span-2">
              <button
                id="submit-book"
                type="submit"
                class="inline-flex rounded-md bg-slate-950 px-5 py-3 text-sm font-semibold text-white transition hover:bg-teal-600"
              >
                Simpan Buku
              </button>
            </div>
          </form>
      </section>
    </main>

    <div id="site-footer"></div>

    <style>
      .form-input {
        margin-top: 0.25rem;
        height: 2.75rem;
        width: 100%;
        border-radius: 0.375rem;
        border: 1px solid rgb(203 213 225);
        padding: 0 0.75rem;
        font-size: 0.875rem;
        outline: none;
        transition: border-color 150ms ease, box-shadow 150ms ease;
      }

      .form-input:focus,
      .form-textarea:focus {
        border-color: rgb(2 6 23);
        box-shadow: 0 0 0 2px rgb(226 232 240);
      }

      .form-textarea {
        margin-top: 0.25rem;
        width: 100%;
        border-radius: 0.375rem;
        border: 1px solid rgb(203 213 225);
        padding: 0.75rem;
        font-size: 0.875rem;
        line-height: 1.6;
        outline: none;
        resize: vertical;
        transition: border-color 150ms ease, box-shadow 150ms ease;
      }
    </style>
    <script src="js/supabase-config.js"></script>
    <script type="module">
      import { renderLayout } from "./js/layout.js";
      renderLayout("dashboard");
    </script>
    <script type="module" src="js/dashboard.js"></script>
  </body>
</html>
