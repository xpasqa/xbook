<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katalog Buku | Publion Research</title>
    <meta
      name="description"
      content="Katalog buku Publion Research. Jelajahi judul, penulis, sinopsis, ISBN, dan harga buku."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              onest: ['"Onest"', "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="font-onest bg-white text-slate-950 antialiased">
    <div id="site-header"></div>

    <main>
      <section class="bg-white px-4 py-8 sm:px-6 lg:px-8">
        <div class="relative isolate mx-auto min-h-[520px] max-w-screen-xl overflow-hidden rounded-lg bg-slate-950 shadow-sm ring-1 ring-slate-200">
          <video
            class="absolute inset-0 h-full w-full object-cover"
            autoplay
            muted
            loop
            playsinline
            preload="metadata"
            aria-hidden="true"
          >
            <source src="https://videos.pexels.com/video-files/20594652/20594652-hd_1920_1080_24fps.mp4" type="video/mp4" />
          </video>
          <div class="absolute inset-0 bg-slate-950/50"></div>

          <div class="relative z-10 mx-auto flex min-h-[520px] max-w-4xl flex-col items-center justify-center px-5 py-16 text-center sm:px-8 lg:px-10">
            <div class="max-w-3xl">
              <h1 class="text-4xl font-extrabold tracking-tight text-white sm:text-6xl">Books That Stay With You</h1>
              <p class="mt-5 max-w-2xl text-sm leading-6 text-slate-100 sm:text-base">
                Connecting readers with meaningful ideas and lasting impact
              </p>
            </div>

            <form
              id="catalog-filters"
              class="mt-8 w-full max-w-xl"
              autocomplete="off"
            >
              <label class="relative block">
                <span class="sr-only">Cari judul, penulis, atau kata kunci</span>
                <input
                  id="search-input"
                  type="search"
                  placeholder="Cari judul, penulis, kata kunci"
                  class="h-12 w-full rounded-md border border-white/60 bg-white/95 px-4 pr-12 text-sm text-slate-900 shadow-md shadow-slate-950/20 outline-none transition placeholder:text-slate-400 focus:border-white focus:ring-2 focus:ring-white/40"
                />
                <span class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-slate-400">
                  <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  </svg>
                </span>
              </label>
            </form>
          </div>
        </div>
      </section>

      <section class="bg-white px-4 py-8 sm:px-6 lg:px-8">
        <div class="mx-auto max-w-screen-xl">
          <div class="mb-6 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
            <p id="catalog-count" class="text-sm font-medium text-slate-600">Memuat katalog...</p>
            <p id="catalog-source" class="text-xs text-slate-500"></p>
          </div>

          <div
            id="book-grid"
            class="grid grid-cols-2 gap-4 sm:gap-6 lg:grid-cols-5"
            aria-live="polite"
          ></div>

          <div id="catalog-pagination" class="mt-8 flex items-center justify-center gap-2"></div>

          <div id="empty-state" class="hidden rounded-md border border-dashed border-slate-300 px-6 py-16 text-center">
            <h2 class="text-lg font-semibold text-slate-950">Buku tidak ditemukan</h2>
            <p class="mt-2 text-sm text-slate-600">Coba ubah pencarian, kategori, atau rentang harga.</p>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="js/supabase-config.js"></script>
    <script type="module">
      import { renderLayout } from "./js/layout.js";
      renderLayout("catalog");
    </script>
    <script type="module" src="js/catalog.js"></script>
  </body>
</html>
