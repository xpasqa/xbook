<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Buku | Publion Research</title>
    <meta name="description" content="Detail buku Publion Research." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              onest: ['"Onest"', "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="font-onest bg-white text-slate-950 antialiased">
    <div id="site-header"></div>

    <main class="min-h-screen">
      <section class="px-4 py-10 sm:px-6 lg:px-8">
        <div id="book-detail" class="mx-auto max-w-screen-xl" aria-live="polite">
          <div class="rounded-md border border-slate-200 px-6 py-12 text-center text-sm text-slate-600">Memuat detail buku...</div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <style>
      .order-input {
        margin-top: 0.25rem;
        height: 2.75rem;
        width: 100%;
        border-radius: 0.375rem;
        border: 1px solid rgb(203 213 225);
        padding: 0 0.75rem;
        font-size: 0.875rem;
        outline: none;
        transition: border-color 150ms ease, box-shadow 150ms ease;
      }

      .order-textarea {
        margin-top: 0.25rem;
        width: 100%;
        border-radius: 0.375rem;
        border: 1px solid rgb(203 213 225);
        padding: 0.75rem;
        font-size: 0.875rem;
        line-height: 1.6;
        outline: none;
        resize: vertical;
        transition: border-color 150ms ease, box-shadow 150ms ease;
      }

      .order-input:focus,
      .order-textarea:focus {
        border-color: rgb(2 6 23);
        box-shadow: 0 0 0 2px rgb(226 232 240);
      }
    </style>
    <script src="js/supabase-config.js"></script>
    <script type="module">
      import { renderLayout } from "./js/layout.js";
      renderLayout("catalog");
    </script>
    <script type="module" src="js/detail.js"></script>
  </body>
</html>
