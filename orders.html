<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Buku | Publion Books</title>
    <meta name="description" content="Dashboard order buku Publion Books." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              onest: ['"Onest"', "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="font-onest bg-slate-50 text-slate-950 antialiased">
    <div id="site-header"></div>

    <main class="mx-auto max-w-screen-xl px-4 py-8 sm:px-6 lg:px-8">
      <div class="mb-8 flex flex-col gap-3 lg:flex-row lg:items-end lg:justify-between">
        <div>
          <h1 class="text-3xl font-bold tracking-tight text-slate-950">Order Buku</h1>
          <p class="mt-2 text-sm text-slate-600">Daftar order buku yang masuk dari halaman detail buku.</p>
        </div>
        <div class="flex flex-wrap gap-3">
          <a
            href="/dashboard.html"
            class="inline-flex w-fit rounded-md border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-900 transition hover:bg-slate-100"
          >
            Dashboard Buku
          </a>
          <a
            href="/"
            class="inline-flex w-fit rounded-md bg-slate-950 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-teal-600"
          >
            Lihat Katalog
          </a>
        </div>
      </div>

      <div id="orders-alert" class="mb-6 hidden rounded-md border px-4 py-3 text-sm"></div>

      <section class="rounded-md bg-white shadow-sm ring-1 ring-slate-200">
        <div class="flex items-center justify-between gap-3 border-b border-slate-200 px-5 py-4">
          <h2 class="text-lg font-bold text-slate-950">Order Masuk</h2>
          <span id="orders-count" class="text-xs font-semibold text-slate-500"></span>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-slate-200 text-left text-sm">
            <thead class="bg-slate-50 text-xs font-bold uppercase tracking-wide text-slate-500">
              <tr>
                <th class="px-5 py-3">Invoice</th>
                <th class="px-5 py-3">Buku</th>
                <th class="px-5 py-3">Pemesan</th>
                <th class="px-5 py-3">Kontak</th>
                <th class="px-5 py-3">Status</th>
                <th class="px-5 py-3 text-right">Bukti</th>
                <th class="px-5 py-3 text-right">WhatsApp</th>
              </tr>
            </thead>
            <tbody id="orders-table" class="divide-y divide-slate-100 bg-white text-slate-700">
              <tr>
                <td class="px-5 py-4" colspan="7">Memuat order...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="js/supabase-config.js"></script>
    <script type="module">
      import { renderLayout } from "./js/layout.js";
      renderLayout("dashboard");
    </script>
    <script type="module" src="js/orders.js"></script>
  </body>
</html>
